spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chatbot_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=${PORT:8080}
groq.api.key=${GROQ_API_KEY:your-groq-api-key-here}
jwt.secret=${JWT_SECRET:myVerySecureSecretKeyForJWT123456789}
logging.level.com.grovyn.chatbot=INFO