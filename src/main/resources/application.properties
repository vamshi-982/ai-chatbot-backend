spring.application.name=chatbot

# =============================================
# DATABASE CONFIG
# Works on PC (port 3307) and Railway (env vars)
# =============================================
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3307/chatbot_db}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server port (Railway sets PORT env var automatically)
server.port=${PORT:8080}

# =============================================
# GROQ API KEY
# On PC: uses the value below as fallback
# On Railway: set GROQ_API_KEY as env variable
# =============================================
groq.api.key=${GROQ_API_KEY:your-groq-api-key-here}

# =============================================
# JWT SECRET KEY
# Fixed key so tokens survive restarts
# On Railway: set JWT_SECRET as env variable
# IMPORTANT: Must be at least 32 characters!
# =============================================
jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890}
