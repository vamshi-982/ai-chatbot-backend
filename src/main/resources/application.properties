spring.application.name=chatbot

# =============================================
# DATABASE — PostgreSQL for Render deployment
# Locally still works with MySQL
# =============================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/chatbot_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:12345}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server port
server.port=${PORT:8080}

# GROQ API KEY
groq.api.key=${GROQ_API_KEY:your-groq-api-key-here}

# JWT SECRET
jwt.secret=${JWT_SECRET:myVerySecureSecretKeyForJWT123456789}

# Logging
logging.level.com.grovyn.chatbot=INFO
logging.level.org.springframework.security=WARN